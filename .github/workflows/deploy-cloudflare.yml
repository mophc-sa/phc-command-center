name: Deploy Cloudflare Worker

on:
  # Auto-deploy to production on every merge to main.
  push:
    branches: [main]
  # Manual dispatch: choose canary (version upload, no traffic cut) or
  # production (full cutover to agent.phc-sa.com).
  workflow_dispatch:
    inputs:
      target:
        description: Deployment target
        required: true
        default: canary
        type: choice
        options:
          - canary
          - production

permissions:
  contents: read

concurrency:
  # One deployment per target at a time. Push-triggered runs use
  # 'production'; manual canary runs are separate.
  group: cloudflare-${{ github.event_name == 'push' && 'production' || inputs.target }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy ${{ github.event_name == 'push' && 'production (auto)' || inputs.target }}
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production-cloudflare
    env:
      # Push → always production. Manual dispatch → use the chosen target.
      DEPLOY_TARGET: ${{ github.event_name == 'push' && 'production' || inputs.target }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_ZONE_ID: ${{ vars.CLOUDFLARE_ZONE_ID }}
      SUPABASE_PROJECT_ID: ${{ vars.SUPABASE_PROJECT_ID }}
      SUPABASE_URL: ${{ vars.SUPABASE_URL }}
      VITE_SUPABASE_PROJECT_ID: ${{ vars.SUPABASE_PROJECT_ID }}
      VITE_SUPABASE_URL: ${{ vars.SUPABASE_URL }}
      SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
      WORKER_NAME: mophc-sa-phc-command-center
      DNS_RECORD_NAME: agent.phc-sa.com
      WRANGLER_VERSION: 4.112.0

    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Normalize and verify Cloudflare deployment access
        shell: bash
        env:
          RAW_CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -euo pipefail

          # Cloudflare API tokens never contain whitespace. Removing it here
          # protects deployments from line breaks accidentally pasted into the
          # GitHub Environment secret, which otherwise produce an invalid HTTP
          # Authorization header before Wrangler can authenticate.
          token="${RAW_CLOUDFLARE_API_TOKEN//$'\r'/}"
          token="${token//$'\n'/}"
          token="${token//$'\t'/}"
          token="${token// /}"
          if [ -z "$token" ]; then
            echo "Missing required production-cloudflare value: CLOUDFLARE_API_TOKEN" >&2
            exit 1
          fi
          if [ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]; then
            echo "Missing required production-cloudflare value: CLOUDFLARE_ACCOUNT_ID" >&2
            exit 1
          fi

          echo "::add-mask::$token"
          printf 'CLOUDFLARE_API_TOKEN=%s\n' "$token" >>"$GITHUB_ENV"

          if ! bindings="$(curl --fail --silent --show-error \
            --header "Authorization: Bearer ${token}" \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/workers/scripts/${WORKER_NAME}/secrets")"; then
            echo "Cloudflare API token cannot read the production Worker secrets. Verify the token value, account scope, and Workers Scripts Write permission." >&2
            exit 1
          fi
          jq -e '.success == true and (.result | type == "array")' <<<"$bindings" >/dev/null || {
            echo "Cloudflare returned an unexpected Worker secrets response." >&2
            exit 1
          }
          for name in SUPABASE_URL SUPABASE_PUBLISHABLE_KEY SUPABASE_SERVICE_ROLE_KEY; do
            jq -e --arg name "$name" 'any(.result[]; .name == $name)' <<<"$bindings" >/dev/null || {
              echo "Missing required Worker secret binding: $name" >&2
              exit 1
            }
          done
          echo "Cloudflare deployment access and Worker secret bindings verified."

      - name: Validate deployment configuration
        shell: bash
        run: |
          set -euo pipefail
          for name in CLOUDFLARE_ACCOUNT_ID CLOUDFLARE_API_TOKEN CLOUDFLARE_ZONE_ID SUPABASE_PROJECT_ID SUPABASE_URL SUPABASE_PUBLISHABLE_KEY VITE_SUPABASE_PUBLISHABLE_KEY; do
            if [ -z "${!name:-}" ]; then
              echo "Missing required production-cloudflare value: $name" >&2
              exit 1
            fi
          done
          case "$SUPABASE_URL" in
            https://lrfdtoexyeghrzynapyn.supabase.co) ;;
            *) echo "Refusing to deploy with an unexpected Supabase project URL" >&2; exit 1 ;;
          esac

      - run: bun install --frozen-lockfile

      - name: Verify source
        run: bun run verify

      - name: Upload canary version
        if: env.DEPLOY_TARGET == 'canary'
        shell: bash
        run: |
          set -euo pipefail
          output="$(bunx wrangler@${WRANGLER_VERSION} versions upload \
            --config .output/server/wrangler.json \
            --name "$WORKER_NAME" \
            --preview-alias phc-canary \
            --keep-vars \
            --message "Canary ${GITHUB_SHA}")"
          printf '%s\n' "$output"
          canary_url="$(grep -Eo 'https://[^[:space:]]+\.workers\.dev' <<<"$output" | tail -1)"
          if [ -z "$canary_url" ]; then
            echo "Wrangler did not return a canary URL" >&2
            exit 1
          fi
          curl --fail --location --silent --show-error --retry 8 --retry-all-errors --retry-delay 5 "${canary_url}/auth" >/dev/null
          echo "Canary health check passed: ${canary_url}/auth"

      - name: Snapshot production DNS for rollback
        if: env.DEPLOY_TARGET == 'production'
        shell: bash
        run: |
          set -euo pipefail
          response="$(curl --fail --silent --show-error \
            --header "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/dns_records?name=${DNS_RECORD_NAME}")"
          jq -e '.success == true' <<<"$response" >/dev/null
          record_count="$(jq '.result | length' <<<"$response")"
          if [ "$record_count" -lt 1 ]; then
            echo "No existing DNS record found for ${DNS_RECORD_NAME}; refusing production cutover" >&2
            exit 1
          fi
          jq '[.result[] | {id, type, name, content, proxied, ttl}]' <<<"$response" \
            >"${RUNNER_TEMP}/agent-dns-before.json"
          echo "Captured ${record_count} pre-cutover DNS record(s) for ${DNS_RECORD_NAME}."

      - name: Preserve production DNS rollback snapshot
        if: env.DEPLOY_TARGET == 'production'
        uses: actions/upload-artifact@v6
        with:
          name: agent-dns-before-${{ github.run_id }}
          path: ${{ runner.temp }}/agent-dns-before.json
          retention-days: 90
          if-no-files-found: error

      - name: Deploy production custom domain
        if: env.DEPLOY_TARGET == 'production'
        shell: bash
        run: |
          set -euo pipefail
          bunx wrangler@${WRANGLER_VERSION} deploy \
            --config .output/server/wrangler.json \
            --name "$WORKER_NAME" \
            --domain agent.phc-sa.com \
            --keep-vars \
            --message "Production ${GITHUB_SHA}"
          curl --fail --location --silent --show-error --retry 12 --retry-all-errors --retry-delay 5 https://agent.phc-sa.com/auth >/dev/null
          echo "Production health check passed: https://agent.phc-sa.com/auth"
