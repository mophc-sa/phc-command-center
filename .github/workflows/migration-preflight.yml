name: Production Migration Preflight

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  preflight:
    name: Read-only production schema preflight
    runs-on: ubuntu-latest
    environment: production-preflight
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      EXPECTED_PROJECT_REF: lrfdtoexyeghrzynapyn
    steps:
      - uses: actions/checkout@v7
      - uses: supabase/setup-cli@v3
        with:
          version: 2.109.1
      - name: Validate target project and link via access token
        id: target
        shell: bash
        run: |
          set -euo pipefail
          actual_ref="$(sed -n 's/^project_id = "\([^"]*\)"/\1/p' supabase/config.toml)"
          test "$actual_ref" = "$EXPECTED_PROJECT_REF"
          test -n "${SUPABASE_ACCESS_TOKEN:-}"
          supabase link --project-ref "$EXPECTED_PROJECT_REF"
      - name: List local and remote migration state
        shell: bash
        run: |
          set -euo pipefail
          supabase migration list --linked 2>&1 | tee migration-state.txt
      - name: Lint linked schema without mutation
        if: always() && steps.target.outcome == 'success'
        shell: bash
        run: |
          set -euo pipefail
          supabase db lint --linked --level warning 2>&1 | tee database-lint.txt
      - name: Upload preflight evidence
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: production-migration-preflight
          path: |
            migration-state.txt
            database-lint.txt
          retention-days: 30
