name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  typecheck-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: bun install --frozen-lockfile
      - name: TypeScript check
        run: bun run typecheck
      - name: Supabase Edge Function check
        run: deno check --import-map supabase/functions/import_map.json supabase/functions/sales-os-api/index.ts
      - name: Unit and contract tests
        run: bun run test
      - name: Production build
        run: bun run build

  playwright-smoke:
    runs-on: ubuntu-latest
    needs: typecheck-build
    permissions:
      contents: read
    env:
      TEST_APP_URL: ${{ secrets.TEST_APP_URL }}
      TEST_SYSTEM_ADMIN_EMAIL: ${{ secrets.TEST_SYSTEM_ADMIN_EMAIL }}
      TEST_SYSTEM_ADMIN_PASSWORD: ${{ secrets.TEST_SYSTEM_ADMIN_PASSWORD }}
      TEST_MANAGING_DIRECTOR_EMAIL: ${{ secrets.TEST_MANAGING_DIRECTOR_EMAIL }}
      TEST_MANAGING_DIRECTOR_PASSWORD: ${{ secrets.TEST_MANAGING_DIRECTOR_PASSWORD }}
      TEST_GENERAL_MANAGER_EMAIL: ${{ secrets.TEST_GENERAL_MANAGER_EMAIL }}
      TEST_GENERAL_MANAGER_PASSWORD: ${{ secrets.TEST_GENERAL_MANAGER_PASSWORD }}
      TEST_SALES_MANAGER_EMAIL: ${{ secrets.TEST_SALES_MANAGER_EMAIL }}
      TEST_SALES_MANAGER_PASSWORD: ${{ secrets.TEST_SALES_MANAGER_PASSWORD }}
      TEST_BD_MANAGER_EMAIL: ${{ secrets.TEST_BD_MANAGER_EMAIL }}
      TEST_BD_MANAGER_PASSWORD: ${{ secrets.TEST_BD_MANAGER_PASSWORD }}
      TEST_SALESPERSON_EMAIL: ${{ secrets.TEST_SALESPERSON_EMAIL }}
      TEST_SALESPERSON_PASSWORD: ${{ secrets.TEST_SALESPERSON_PASSWORD }}
      TEST_VIEWER_EMAIL: ${{ secrets.TEST_VIEWER_EMAIL }}
      TEST_VIEWER_PASSWORD: ${{ secrets.TEST_VIEWER_PASSWORD }}
      TEST_SALES_OPS_EMAIL: ${{ secrets.TEST_SALES_OPS_EMAIL }}
      TEST_SALES_OPS_PASSWORD: ${{ secrets.TEST_SALES_OPS_PASSWORD }}
      TEST_CEO_EMAIL: ${{ secrets.TEST_CEO_EMAIL }}
      TEST_CEO_PASSWORD: ${{ secrets.TEST_CEO_PASSWORD }}
      TEST_PENDING_EMAIL: ${{ secrets.TEST_PENDING_EMAIL }}
      TEST_PENDING_PASSWORD: ${{ secrets.TEST_PENDING_PASSWORD }}
      TEST_SUSPENDED_EMAIL: ${{ secrets.TEST_SUSPENDED_EMAIL }}
      TEST_SUSPENDED_PASSWORD: ${{ secrets.TEST_SUSPENDED_PASSWORD }}
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium
      - name: Build app
        run: bun run build
      - name: Start app
        run: |
          bun run preview --port 8080 &
          echo "APP_PID=$!" >> $GITHUB_ENV
          for i in {1..30}; do
            curl -sf http://localhost:8080 > /dev/null && break
            sleep 1
          done
      - name: Playwright smoke (skips roles without credentials)
        env:
          PLAYWRIGHT_BASE_URL: ${{ env.TEST_APP_URL || 'http://localhost:8080' }}
        run: bunx playwright test
      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7
      - name: Stop app
        if: always()
        run: kill $APP_PID || true
