name: Production Readiness

on:
  workflow_dispatch:
    inputs:
      app_url:
        description: Approved PHC deployment URL to test
        required: true
        default: https://agent.phc-sa.com
        type: choice
        options:
          - https://agent.phc-sa.com
          - https://phc-canary-mophc-sa-phc-command-center.phc-sa.workers.dev

permissions:
  contents: read

jobs:
  role-matrix:
    name: Required role and account-state matrix
    runs-on: ubuntu-latest
    environment: production-readiness
    env:
      TEST_APP_URL: ${{ inputs.app_url }}
      TEST_SYSTEM_ADMIN_EMAIL: ${{ secrets.TEST_SYSTEM_ADMIN_EMAIL }}
      TEST_SYSTEM_ADMIN_PASSWORD: ${{ secrets.TEST_SYSTEM_ADMIN_PASSWORD }}
      TEST_MANAGING_DIRECTOR_EMAIL: ${{ secrets.TEST_MANAGING_DIRECTOR_EMAIL }}
      TEST_MANAGING_DIRECTOR_PASSWORD: ${{ secrets.TEST_MANAGING_DIRECTOR_PASSWORD }}
      TEST_GENERAL_MANAGER_EMAIL: ${{ secrets.TEST_GENERAL_MANAGER_EMAIL }}
      TEST_GENERAL_MANAGER_PASSWORD: ${{ secrets.TEST_GENERAL_MANAGER_PASSWORD }}
      TEST_SALES_MANAGER_EMAIL: ${{ secrets.TEST_SALES_MANAGER_EMAIL }}
      TEST_SALES_MANAGER_PASSWORD: ${{ secrets.TEST_SALES_MANAGER_PASSWORD }}
      TEST_BD_MANAGER_EMAIL: ${{ secrets.TEST_BD_MANAGER_EMAIL }}
      TEST_BD_MANAGER_PASSWORD: ${{ secrets.TEST_BD_MANAGER_PASSWORD }}
      TEST_SALES_OPS_EMAIL: ${{ secrets.TEST_SALES_OPS_EMAIL }}
      TEST_SALES_OPS_PASSWORD: ${{ secrets.TEST_SALES_OPS_PASSWORD }}
      TEST_SALESPERSON_EMAIL: ${{ secrets.TEST_SALESPERSON_EMAIL }}
      TEST_SALESPERSON_PASSWORD: ${{ secrets.TEST_SALESPERSON_PASSWORD }}
      TEST_VIEWER_EMAIL: ${{ secrets.TEST_VIEWER_EMAIL }}
      TEST_VIEWER_PASSWORD: ${{ secrets.TEST_VIEWER_PASSWORD }}
      TEST_PENDING_EMAIL: ${{ secrets.TEST_PENDING_EMAIL }}
      TEST_PENDING_PASSWORD: ${{ secrets.TEST_PENDING_PASSWORD }}
      TEST_SUSPENDED_EMAIL: ${{ secrets.TEST_SUSPENDED_EMAIL }}
      TEST_SUSPENDED_PASSWORD: ${{ secrets.TEST_SUSPENDED_PASSWORD }}
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bunx playwright install --with-deps chromium
      - name: Run readiness suite without credential skips
        env:
          PLAYWRIGHT_BASE_URL: ${{ env.TEST_APP_URL }}
        # One worker lets the E2E session cache reuse each role's Supabase
        # session and stays below the 30 sign-ins / 5 minutes auth limit.
        run: bun run test:e2e:readiness -- --workers=1
